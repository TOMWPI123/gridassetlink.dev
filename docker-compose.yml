services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telecomne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telecomne_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-telecomne_grid}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telecomne} -d ${POSTGRES_DB:-telecomne_grid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-telecomne}:${POSTGRES_PASSWORD:-telecomne_dev_password}@db:5432/${POSTGRES_DB:-telecomne_grid}
      SECRET_KEY: ${SECRET_KEY:-change-this-local-development-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AUTO_SEED: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
