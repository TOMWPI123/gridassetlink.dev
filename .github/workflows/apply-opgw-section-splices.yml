name: Apply OPGW section splice patch

on:
  push:
    paths:
      - .github/workflows/apply-opgw-section-splices.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch OPGW section splice visibility
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/components/map/MapLayerControlPanel.tsx')
          text = path.read_text()

          replacements = [
              (
                  '                onClearFocus={onClearOpgwFocus}\n              />',
                  '                onClearFocus={onClearOpgwFocus}\n                onLayerChange={onLayerChange}\n              />',
              ),
              (
                  '  onFocusSplicePoint,\n  onClearFocus,\n}: {',
                  '  onFocusSplicePoint,\n  onClearFocus,\n  onLayerChange,\n}: {',
              ),
              (
                  '  onFocusSplicePoint?: (splicePointId: string) => void;\n  onClearFocus?: () => void;\n}) {',
                  '  onFocusSplicePoint?: (splicePointId: string) => void;\n  onClearFocus?: () => void;\n  onLayerChange?: (layer: StreetMapLayerKey, enabled: boolean) => void;\n}) {',
              ),
              (
                  '                        <small>{sectionProperties.fromStructureNumber} to {sectionProperties.toStructureNumber} / {sectionProperties.routeMiles.toFixed(2)} mi / {sectionProperties.installStatus}</small>\n                        <span className="street-opgw-splice-endpoint-list" aria-label={`Splice point endpoints for ${sectionProperties.cableSectionId}`}>',
                  '                        <small>{sectionProperties.fromStructureNumber} to {sectionProperties.toStructureNumber} / {sectionProperties.routeMiles.toFixed(2)} mi / {sectionProperties.installStatus}</small>\n                        {isSectionFocused ? (\n                          <small style={opgwSectionSpliceNoteStyle}>\n                            Isolated section splice points: {splicePointLabel(fromPoint, sectionProperties.fromSplicePointId)} and {splicePointLabel(toPoint, sectionProperties.toSplicePointId)}\n                          </small>\n                        ) : null}\n                        <span className="street-opgw-splice-endpoint-list" aria-label={`Splice point endpoints for ${sectionProperties.cableSectionId}`}>',
              ),
              (
                  '                        onClick={() => onFocusSection?.(sectionProperties.cableSectionId)}',
                  '                        onClick={() => {\n                          onFocusSection?.(sectionProperties.cableSectionId);\n                          onLayerChange?.("opgwSplicePoints", true);\n                        }}',
              ),
              (
                  '} satisfies CSSProperties;\n\nfunction opgwRouteSearchText(route: OpgwRouteFeature) {',
                  '} satisfies CSSProperties;\n\nconst opgwSectionSpliceNoteStyle = {\n  color: "#fff4cf",\n  fontWeight: 820,\n} satisfies CSSProperties;\n\nfunction splicePointLabel(splicePoint: OpgwSplicePointFeature | undefined, fallbackId: string) {\n  if (!splicePoint) return fallbackId;\n  return `${splicePoint.properties.splicePointId} (${splicePoint.properties.structureNumber})`;\n}\n\nfunction opgwRouteSearchText(route: OpgwRouteFeature) {',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  if new in text:
                      continue
                  raise SystemExit(f'Missing expected text for patch: {old[:120]}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          workflow_path = Path('.github/workflows/apply-opgw-section-splices.yml')
          workflow_path.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "Codex App"
          git config user.email "codex-app@users.noreply.github.com"
          git add frontend/components/map/MapLayerControlPanel.tsx .github/workflows/apply-opgw-section-splices.yml
          git commit -m "Show splices for isolated OPGW sections"
          git push
